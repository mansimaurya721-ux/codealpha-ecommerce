<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Fieldstone & Co.</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="site-header">
        <div class="container">
            <a href="/index.html" class="brand">Fieldstone<span class="dot">&</span>Co.</a>
            <div class="header-search"></div>
            <nav class="nav-actions">
                <a href="/cart.html">Cart <span id="cart-count" class="cart-count hidden">0</span></a>
                <a href="/login.html" id="auth-link">Log in</a>
            </nav>
        </div>
    </header>

    <div class="form-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to view your cart and orders.</p>

        <div id="alert-box" class="alert error"></div>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="login-btn">Log in</button>
        </form>

        <p class="form-footer-note">Don't have an account? <a href="/register.html" class="btn-text">Create one</a></p>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth-pages.js"></script>
</body>

</html>
