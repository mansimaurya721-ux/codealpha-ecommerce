<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout — CodeAlpha & Co.</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="site-header">
        <div class="container">
            <a href="/index.html" class="brand">CodeAlpha<span class="dot">&</span>Co.</a>
            <div class="header-search">
                <form id="header-search-form">
                    <input type="text" id="header-search-input" placeholder="Search products..." />
                    <button type="submit">Search</button>
                </form>
            </div>
            <nav class="nav-actions">
                <a href="/orders.html" id="orders-link" class="hidden">My Orders</a>
                <a href="/cart.html">Cart <span id="cart-count" class="cart-count hidden">0</span></a>
                <a href="/login.html" id="auth-link">Log in</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div id="checkout-container">
            <p class="loading-text">Loading checkout…</p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">CodeAlpha & Co. — a demo store built for learning purposes.</div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/checkout.js"></script>
</body>

</html>
