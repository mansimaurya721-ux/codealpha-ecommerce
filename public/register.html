<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — CodeAlpha-store</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="site-header">
        <div class="container">
            <a href="/index.html" class="brand">CodeAlpha<span class="dot">&</span>Co.</a>
            <div class="header-search"></div>
            <nav class="nav-actions">
                <a href="/cart.html">Cart <span id="cart-count" class="cart-count hidden">0</span></a>
                <a href="/login.html" id="auth-link">Log in</a>
            </nav>
        </div>
    </header>

    <div class="form-card">
        <h1>Create your account</h1>
        <p class="subtitle">It only takes a moment.</p>

        <div id="alert-box" class="alert error"></div>

        <form id="register-form">
            <div class="field">
                <label for="name">Full name</label>
                <input type="text" id="name" required autocomplete="name" />
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="6" autocomplete="new-password" />
                <p style="font-size:0.8rem; color:#8A8570; margin-top:6px;">At least 6 characters.</p>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="register-btn">Create account</button>
        </form>

        <p class="form-footer-note">Already have an account? <a href="/login.html" class="btn-text">Log in</a></p>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth-pages.js"></script>
</body>

</html>
